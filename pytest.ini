[pytest]
# Pytest configuration for InsureMail AI tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Markers
markers =
    unit: Unit tests for individual Lambda functions
    integration: Integration tests for end-to-end workflows
    terraform: Terraform configuration validation tests
    slow: Tests that take significant time to run
    aws: Tests that require AWS credentials/resources

# Coverage options
addopts =
    --verbose
    --strict-markers
    --tb=short
    --cov=lambda
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml
    --cov-fail-under=70

# Ignore warnings from dependencies
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeout for tests (seconds)
timeout = 300

# Parallel execution
# Run with: pytest -n auto
# Requires: pip install pytest-xdist
